<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceHub Pro - Secure Financial Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    .gradient-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .gradient-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    
    .gradient-danger {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .animate-slide-up {
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .animate-scale-in {
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .stat-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .payment-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .payment-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    
    .payment-card.selected {
      border: 2px solid #667eea;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }
    
    .btn-primary {
      transition: all 0.3s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .input-modern {
      transition: all 0.3s ease;
    }
    
    .input-modern:focus {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.2);
    }
    
    .chart-container {
      position: relative;
      height: 300px;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .toast {
      animation: toastSlide 0.3s ease-out, toastFade 0.3s ease-in 2.7s forwards;
    }
    
    @keyframes toastSlide {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes toastFade {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(400px); opacity: 0; }
    }
    
    .loading-dots {
      display: inline-flex;
      gap: 4px;
    }
    
    .loading-dots span {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
    }
    
    .edit-transaction-row {
      transition: all 0.2s ease;
    }
    
    .edit-transaction-row:hover {
      background: rgba(102, 126, 234, 0.05);
    }
    
    .card-shine {
      position: relative;
      overflow: hidden;
    }
    
    .card-shine::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    .card-shine:hover::before {
      left: 100%;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full"></div>
  <script>
    // State Management
    let currentUser = null;
    let currentView = 'login';
    let allTransactions = [];
    let chartInstances = {};
    let userSettings = JSON.parse(localStorage.getItem('financeHub_settings') || '{}');
    
    const currencies = [
      { code: 'USD', symbol: '$', name: 'US Dollar' },
      { code: 'EUR', symbol: '€', name: 'Euro' },
      { code: 'GBP', symbol: '£', name: 'British Pound' },
      { code: 'JPY', symbol: '¥', name: 'Japanese Yen' },
      { code: 'INR', symbol: '₹', name: 'Indian Rupee' },
      { code: 'AUD', symbol: 'A$', name: 'Australian Dollar' },
      { code: 'CAD', symbol: 'C$', name: 'Canadian Dollar' },
      { code: 'CNY', symbol: '¥', name: 'Chinese Yuan' }
    ];
    
    const themes = [
      { id: 'purple', name: 'Purple Dream', start: '#667eea', end: '#764ba2' },
      { id: 'ocean', name: 'Ocean Blue', start: '#2E3192', end: '#1BFFFF' },
      { id: 'sunset', name: 'Sunset Orange', start: '#ff6b6b', end: '#feca57' },
      { id: 'forest', name: 'Forest Green', start: '#11998e', end: '#38ef7d' },
      { id: 'rose', name: 'Rose Gold', start: '#eb3349', end: '#f45c43' },
      { id: 'midnight', name: 'Midnight Blue', start: '#0f2027', end: '#2c5364' }
    ];
    
    const defaultConfig = {
      app_title: 'FinanceHub Pro',
      welcome_message: 'Welcome to your financial dashboard',
      dashboard_title: 'Financial Overview',
      stats_label: 'Key Metrics',
      transactions_label: 'Recent Transactions',
      primary_gradient_start: '#667eea',
      primary_gradient_end: '#764ba2',
      success_color: '#10b981',
      danger_color: '#ef4444',
      background_color: '#f8fafc'
    };
    
    let config = { ...defaultConfig };
    
    // User database (localStorage simulation)
    const userDatabase = JSON.parse(localStorage.getItem('financeHub_users') || '{}');
    
    // Payment methods
    const paymentMethods = [
      { id: 'credit_card', name: 'Credit Card', icon: '💳', color: '#8b5cf6' },
      { id: 'debit_card', name: 'Debit Card', icon: '💰', color: '#3b82f6' },
      { id: 'upi', name: 'UPI', icon: '📱', color: '#10b981' },
      { id: 'cash', name: 'Cash', icon: '💵', color: '#f59e0b' },
      { id: 'bank_transfer', name: 'Bank Transfer', icon: '🏦', color: '#06b6d4' }
    ];
    
    // Categories
    const categories = [
      { id: 'groceries', name: 'Groceries', icon: '🛒', color: '#10b981' },
      { id: 'dining', name: 'Dining Out', icon: '🍽️', color: '#f97316' },
      { id: 'transport', name: 'Transportation', icon: '🚗', color: '#3b82f6' },
      { id: 'shopping', name: 'Shopping', icon: '🛍️', color: '#ec4899' },
      { id: 'bills', name: 'Bills & Utilities', icon: '💡', color: '#8b5cf6' },
      { id: 'entertainment', name: 'Entertainment', icon: '🎬', color: '#f59e0b' },
      { id: 'health', name: 'Healthcare', icon: '🏥', color: '#14b8a6' },
      { id: 'salary', name: 'Salary', icon: '💼', color: '#10b981' },
      { id: 'freelance', name: 'Freelancing', icon: '💻', color: '#6366f1' },
      { id: 'investment', name: 'Investment', icon: '📈', color: '#8b5cf6' },
      { id: 'other', name: 'Other', icon: '📦', color: '#64748b' }
    ];
    
    // Data SDK Handler
    const dataHandler = {
      onDataChanged(data) {
        allTransactions = data || [];
        if (currentView === 'dashboard') {
          renderDashboard(document.getElementById('app'));
        }
      }
    };
    
    // Initialize App
    async function initApp() {
      try {
        const savedUser = localStorage.getItem('financeHub_currentUser');
        if (savedUser) {
          currentUser = JSON.parse(savedUser);
        }
        
        if (window.dataSdk) {
          const result = await window.dataSdk.init(dataHandler);
          if (!result.isOk) {
            console.error('Data SDK initialization failed');
          }
        }
        
        if (window.elementSdk) {
          window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (newConfig) => {
              config = { ...config, ...newConfig };
              renderCurrentView();
            },
            mapToCapabilities: (cfg) => ({
              recolorables: [
                {
                  get: () => cfg.primary_gradient_start || defaultConfig.primary_gradient_start,
                  set: (v) => window.elementSdk.setConfig({ primary_gradient_start: v })
                },
                {
                  get: () => cfg.primary_gradient_end || defaultConfig.primary_gradient_end,
                  set: (v) => window.elementSdk.setConfig({ primary_gradient_end: v })
                },
                {
                  get: () => cfg.success_color || defaultConfig.success_color,
                  set: (v) => window.elementSdk.setConfig({ success_color: v })
                },
                {
                  get: () => cfg.danger_color || defaultConfig.danger_color,
                  set: (v) => window.elementSdk.setConfig({ danger_color: v })
                },
                {
                  get: () => cfg.background_color || defaultConfig.background_color,
                  set: (v) => window.elementSdk.setConfig({ background_color: v })
                }
              ],
              borderables: [],
              fontEditable: undefined,
              fontSizeable: undefined
            }),
            mapToEditPanelValues: (cfg) => new Map([
              ['app_title', cfg.app_title || defaultConfig.app_title],
              ['welcome_message', cfg.welcome_message || defaultConfig.welcome_message],
              ['dashboard_title', cfg.dashboard_title || defaultConfig.dashboard_title],
              ['stats_label', cfg.stats_label || defaultConfig.stats_label],
              ['transactions_label', cfg.transactions_label || defaultConfig.transactions_label]
            ])
          });
          config = { ...defaultConfig, ...window.elementSdk.config };
        }
      } catch (e) {
        console.error('Init error:', e);
      }
      
      render();
    }
    
    // User Management
    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash.toString(36);
    }
    
    function registerUser(username, email, password) {
      if (userDatabase[username]) {
        return { success: false, message: 'Username already exists' };
      }
      
      const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      userDatabase[username] = {
        userId,
        username,
        email,
        passwordHash: hashPassword(password),
        createdAt: new Date().toISOString()
      };
      
      localStorage.setItem('financeHub_users', JSON.stringify(userDatabase));
      return { success: true, userId };
    }
    
    function loginUser(username, password) {
      const user = userDatabase[username];
      if (!user) {
        return { success: false, message: 'User not found' };
      }
      
      if (user.passwordHash !== hashPassword(password)) {
        return { success: false, message: 'Incorrect password' };
      }
      
      currentUser = {
        userId: user.userId,
        username: user.username,
        email: user.email
      };
      
      localStorage.setItem('financeHub_currentUser', JSON.stringify(currentUser));
      return { success: true };
    }
    
    function logoutUser() {
      currentUser = null;
      localStorage.removeItem('financeHub_currentUser');
      currentView = 'login';
      destroyCharts();
      render();
      showToast('Logged out successfully', 'success');
    }
    
    // Utility Functions
    function getUserTransactions() {
      if (!currentUser) return [];
      return allTransactions.filter(t => t.userId === currentUser.userId);
    }
    
    function getCategoryById(id) {
      return categories.find(c => c.id === id) || categories[categories.length - 1];
    }
    
    function getPaymentMethodById(id) {
      return paymentMethods.find(p => p.id === id) || paymentMethods[0];
    }
    
    function formatCurrency(amount) {
      const currencyCode = (userSettings[currentUser?.userId]?.currency) || 'USD';
      const currency = currencies.find(c => c.code === currencyCode) || currencies[0];
      return currency.symbol + Math.abs(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    
    function calculateStats() {
      const userTxns = getUserTransactions();
      const income = userTxns.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
      const expenses = userTxns.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
      const balance = income - expenses;
      
      const categoryData = {};
      const paymentData = {};
      
      userTxns.forEach(t => {
        categoryData[t.category] = (categoryData[t.category] || 0) + t.amount;
        paymentData[t.paymentMethod] = (paymentData[t.paymentMethod] || 0) + t.amount;
      });
      
      return { income, expenses, balance, total: userTxns.length, categoryData, paymentData };
    }
    
    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast-container');
      if (existing) existing.remove();
      
      const colors = {
        success: '#10b981',
        error: '#ef4444',
        warning: '#f59e0b',
        info: '#3b82f6'
      };
      
      const icons = {
        success: '✓',
        error: '✕',
        warning: '⚠',
        info: 'ℹ'
      };
      
      const toast = document.createElement('div');
      toast.className = 'toast-container fixed top-6 right-6 z-50';
      toast.innerHTML = `
        <div class="toast px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 text-white" style="background: ${colors[type]};">
          <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center font-bold">
            ${icons[type]}
          </div>
          <span class="font-medium">${message}</span>
        </div>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    function destroyCharts() {
      Object.values(chartInstances).forEach(chart => {
        if (chart) chart.destroy();
      });
      chartInstances = {};
    }
    
    // Render Functions
    function render() {
      if (!currentUser) {
        renderAuth(document.getElementById('app'));
      } else {
        if (currentView === 'login' || currentView === 'signup') {
          currentView = 'dashboard';
        }
        renderDashboard(document.getElementById('app'));
      }
    }
    
    function renderCurrentView() {
      render();
    }
    
    function renderAuth(container) {
      const primaryStart = config.primary_gradient_start || defaultConfig.primary_gradient_start;
      const primaryEnd = config.primary_gradient_end || defaultConfig.primary_gradient_end;
      const bgColor = config.background_color || defaultConfig.background_color;
      
      const isSignup = currentView === 'signup';
      
      container.innerHTML = `
        <div class="h-full w-full flex items-center justify-center px-6 py-12 overflow-y-auto scrollbar-hide" style="background: ${bgColor};">
          <div class="w-full max-w-md animate-scale-in">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
              <div class="w-20 h-20 mx-auto mb-6 rounded-3xl flex items-center justify-center shadow-2xl" 
                style="background: linear-gradient(135deg, ${primaryStart} 0%, ${primaryEnd} 100%);">
                <span class="text-4xl">💎</span>
              </div>
              <h1 class="text-4xl font-bold mb-2" style="background: linear-gradient(135deg, ${primaryStart}, ${primaryEnd}); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                ${config.app_title || defaultConfig.app_title}
              </h1>
              <p class="text-gray-600">${config.welcome_message || defaultConfig.welcome_message}</p>
            </div>
            
            <!-- Auth Card -->
            <div class="glass-panel rounded-3xl p-8 shadow-2xl">
              <div class="flex gap-2 mb-6">
                <button onclick="switchView('login')" 
                  class="flex-1 py-3 rounded-xl font-semibold transition-all ${!isSignup ? 'text-white' : 'text-gray-600'}"
                  style="background: ${!isSignup ? `linear-gradient(135deg, ${primaryStart}, ${primaryEnd})` : 'transparent'};">
                  Login
                </button>
                <button onclick="switchView('signup')" 
                  class="flex-1 py-3 rounded-xl font-semibold transition-all ${isSignup ? 'text-white' : 'text-gray-600'}"
                  style="background: ${isSignup ? `linear-gradient(135deg, ${primaryStart}, ${primaryEnd})` : 'transparent'};">
                  Sign Up
                </button>
              </div>
              
              <form onsubmit="${isSignup ? 'handleSignup(event)' : 'handleLogin(event)'}" class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                  <input type="text" id="authUsername" required
                    class="input-modern w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                    placeholder="Enter username">
                </div>
                
                ${isSignup ? `
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="authEmail" required
                      class="input-modern w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                      placeholder="your@email.com">
                  </div>
                ` : ''}
                
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                  <input type="password" id="authPassword" required ${isSignup ? 'minlength="6"' : ''}
                    class="input-modern w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none"
                    placeholder="${isSignup ? 'Min 6 characters' : 'Enter password'}">
                </div>
                
                <button type="submit" id="authBtn"
                  class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg shadow-xl"
                  style="background: linear-gradient(135deg, ${primaryStart}, ${primaryEnd});">
                  <span id="authBtnText">${isSignup ? 'Create Account' : 'Sign In'}</span>
                  <div id="authBtnLoader" class="loading-dots hidden">
                    <span></span><span></span><span></span>
                  </div>
                </button>
              </form>
              
              <p class="text-center text-sm text-gray-600 mt-6">
                🔒 Your data is encrypted and private
              </p>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderDashboard(container) {
      if (!currentUser) return;
      
      const stats = calculateStats();
      const recentTxns = getUserTransactions()
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .slice(0, 5);
      
      const primaryStart = config.primary_gradient_start || defaultConfig.primary_gradient_start;
      const primaryEnd = config.primary_gradient_end || defaultConfig.primary_gradient_end;
      const successColor = config.success_color || defaultConfig.success_color;
      const dangerColor = config.danger_color || defaultConfig.danger_color;
      const bgColor = config.background_color || defaultConfig.background_color;
      
      container.innerHTML = `
        <div class="h-full w-full flex flex-col" style="background: ${bgColor};">
          <!-- Header -->
          <header class="glass-panel shadow-lg">
            <div class="max-w-7xl mx-auto px-6 py-4">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-2xl flex items-center justify-center"
                    style="background: linear-gradient(135deg, ${primaryStart}, ${primaryEnd});">
                    <span class="text-2xl">💎</span>
                  </div>
                  <div>
                    <h1 class="text-xl font-bold text-gray-900">${config.app_title || defaultConfig.app_title}</h1>
                    <p class="text-sm text-gray-600">Welcome, ${currentUser.username}</p>
                  </div>
                </div>
                
                <div class="flex items-center gap-3">
                  <button onclick="openAddTransaction()" 
                    class="btn-primary px-6 py-3 rounded-xl text-white font-semibold shadow-lg flex items-center gap-2"
                    style="background: linear-gradient(135deg, ${primaryStart}, ${primaryEnd});">
                    <span class="text-xl">+</span>
                    <span>Add Transaction</span>
                  </button>
                  <button onclick="openHistory()" 
                    class="px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 font-semibold flex items-center gap-2">
                    <span class="text-lg">📋</span>
                    <span>History</span>
                  </button>
                  <button onclick="toggleSettingsMenu()" 
                    class="relative px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 font-semibold flex items-center gap-2">
                    <span class="text-lg">⚙️</span>
                    <span>Settings</span>
                  </button>
                </div>
              </div>
            </div>
          </header>
          
          <!-- Settings Dropdown -->
          <div id="settingsMenu" class="hidden fixed top-20 right-6 z-40 glass-panel rounded-2xl shadow-2xl w-80 animate-scale-in">
            <div class="p-2">
              <button onclick="openEditProfile()" 
                class="w-full px-4 py-3 rounded-xl hover:bg-gray-100 flex items-center gap-3 text-left">
                <span class="text-2xl">👤</span>
                <div>
                  <p class="font-semibold text-gray-900">Edit Profile</p>
                  <p class="text-xs text-gray-600">Update your information</p>
                </div>
              </button>
              
              <button onclick="openThemeSettings()" 
                class="w-full px-4 py-3 rounded-xl hover:bg-gray-100 flex items-center gap-3 text-left">
                <span class="text-2xl">🎨</span>
                <div>
                  <p class="font-semibold text-gray-900">Theme</p>
                  <p class="text-xs text-gray-600">Customize appearance</p>
                </div>
              </button>
              
              <button onclick="openCurrencySettings()" 
                class="w-full px-4 py-3 rounded-xl hover:bg-gray-100 flex items-center gap-3 text-left">
                <span class="text-2xl">💱</span>
                <div>
                  <p class="font-semibold text-gray-900">Currency</p>
                  <p class="text-xs text-gray-600">Change currency format</p>
                </div>
              </button>
              
              <button onclick="openNotificationSettings()" 
                class="w-full px-4 py-3 rounded-xl hover:bg-gray-100 flex items-center gap-3 text-left">
                <span class="text-2xl">🔔</span>
                <div>
                  <p class="font-semibold text-gray-900">Notifications</p>
                  <p class="text-xs text-gray-600">Manage alerts</p>
                </div>
              </button>
              
              <button onclick="openGoogleBackup()" 
                class="w-full px-4 py-3 rounded-xl hover:bg-gray-100 flex items-center gap-3 text-left">

    function renderCharts(stats) {
      destroyCharts();
      
      // Category Chart
      const categoryCtx = document.getElementById('categoryChart');
      if (categoryCtx && Object.keys(stats.categoryData).length > 0) {
        const categoryLabels = Object.keys(stats.categoryData).map(id => getCategoryById(id).name);
        const categoryValues = Object.values(stats.categoryData);
        const categoryColors = Object.keys(stats.categoryData).map(id => getCategoryById(id).color);
        
        chartInstances.category = new Chart(categoryCtx, {
          type: 'doughnut',
          data: {
            labels: categoryLabels,
            datasets: [{
              data: categoryValues,
              backgroundColor: categoryColors,
              borderWidth: 0,
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: {
                  padding: 20,
                  font: { size: 14, weight: '600' },
                  usePointStyle: true,
                  pointStyle: 'circle'
                }
              },
              tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                padding: 12,
                cornerRadius: 8,
                titleFont: { size: 14, weight: 'bold' },
                bodyFont: { size: 13 },
                callbacks: {
                  label: (context) => {
                    const label = context.label || '';
                    const value = formatCurrency(context.parsed);
                    return `${label}: ${value}`;
                  }
                }
              }
            }
          }
        });
      }
      
      // Type Chart
      const typeCtx = document.getElementById('typeChart');
      if (typeCtx) {
        const successColor = config.success_color || defaultConfig.success_color;
        const dangerColor = config.danger_color || defaultConfig.danger_color;
        
        chartInstances.type = new Chart(typeCtx, {
          type: 'bar',
          data: {
            labels: ['Income', 'Expenses'],
            datasets: [{
              label: 'Amount',
              data: [stats.income, stats.expenses],
              backgroundColor: [successColor, dangerColor],
              borderRadius: 12,
              borderSkipped: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                padding: 12,
                cornerRadius: 8,
                titleFont: { size: 14, weight: 'bold' },
                bodyFont: { size: 13 },
                callbacks: {
                  label: (context) => formatCurrency(context.parsed.y)
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { display: false },
                ticks: {
                  font: { size: 12, weight: '600' },
                  callback: (value) => '$' + value.toLocaleString()
                }
              },
              x: {
                grid: { display: false },
                ticks: { font: { size: 14, weight: '600' } }
              }
            }
          }
        });
      }
    }

    async function handleLogin(e) {
      e.preventDefault();

      const btn = document.getElementById('authBtn');
      const btnText = document.getElementById('authBtnText');
      const btnLoader = document.getElementById('authBtnLoader');
      
      btn.disabled = true;
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');
      
      setTimeout(() => {
        const result = loginUser(username, password);
        
        if (result.success) {
          showToast('Welcome back!', 'success');
          currentView = 'dashboard';
          render();
        } else {
          showToast(result.message, 'error');
          btn.disabled = false;
          btnText.classList.remove('hidden');
          btnLoader.classList.add('hidden');
        }
      }, 800);
    }

    function selectType(type) {
      window.selectedTxnType = type;
      const primaryStart = config.primary_gradient_start || defaultConfig.primary_gradient_start;
      const primaryEnd = config.primary_gradient_end || defaultConfig.primary_gradient_end;
      
      const incomeBtn = document.getElementById('incomeBtn');
      const expenseBtn = document.getElementById('expenseBtn');
      
      if (type === 'income') {
        incomeBtn.style.background = 'linear-gradient(135deg, #11998e, #38ef7d)';
        incomeBtn.style.color = 'white';
        incomeBtn.style.borderColor = 'transparent';
        expenseBtn.style.background = 'transparent';
        expenseBtn.style.color = '#4b5563';
        expenseBtn.style.borderColor = '#e5e7eb';
      } else {
        expenseBtn.style.background = `linear-gradient(135deg, ${primaryStart}, ${primaryEnd})`;
        expenseBtn.style.color = 'white';
        expenseBtn.style.borderColor = 'transparent';
        incomeBtn.style.background = 'transparent';
        incomeBtn.style.color = '#4b5563';
        incomeBtn.style.borderColor = '#e5e7eb';
      }
    }
    
    function selectCategory(id) {
      window.selectedTxnCategory = id;
      document.querySelectorAll('.category-btn').forEach(btn => {
        if (btn.dataset.category === id) {
          btn.style.borderColor = '#667eea';
          btn.style.background = '#667eea10';
        } else {
          btn.style.borderColor = '#e5e7eb';
          btn.style.background = 'transparent';
        }
      });
    }
    
    function selectPaymentMethod(id) {
      window.selectedTxnPayment = id;
      document.querySelectorAll('.payment-method-btn').forEach(btn => {
        if (btn.dataset.payment === id) {
          btn.style.borderColor = '#667eea';
          btn.style.background = '#667eea10';
        } else {
          btn.style.borderColor = '#e5e7eb';
          btn.style.background = 'transparent';
        }
      });
    }
    
    async function saveTransaction(e) {
      e.preventDefault();
      
      const amount = parseFloat(document.getElementById('txnAmount').value);
      const description = document.getElementById('txnDescription').value.trim();
      const date = document.getElementById('txnDate').value;
      
      if (!amount || amount <= 0) {
        showToast('Please enter a valid amount', 'error');
        return;
      }
      
      if (getUserTransactions().length >= 999) {
        showToast('Transaction limit reached (999)', 'error');
        return;
      }
      
      const saveBtn = document.getElementById('saveBtn');
      const saveBtnText = document.getElementById('saveBtnText');
      const saveBtnLoader = document.getElementById('saveBtnLoader');
      
      saveBtn.disabled = true;
      saveBtnText.classList.add('hidden');
      saveBtnLoader.classList.remove('hidden');
      
      try {
        if (window.dataSdk) {
          const result = await window.dataSdk.create({
            userId: currentUser.userId,
            type: window.selectedTxnType,
            category: window.selectedTxnCategory,
            paymentMethod: window.selectedTxnPayment,
            amount,
            description,
            date,
            createdAt: new Date().toISOString()
          });
          
          if (result.isOk) {
            showToast('Transaction saved successfully!', 'success');
            closeModal();
          } else {
            showToast('Failed to save transaction', 'error');
            saveBtn.disabled = false;
            saveBtnText.classList.remove('hidden');
            saveBtnLoader.classList.add('hidden');
          }
        }
      } catch (e) {
        showToast('An error occurred', 'error');
        saveBtn.disabled = false;
        saveBtnText.classList.remove('hidden');
        saveBtnLoader.classList.add('hidden');
      }
    }
    
    function closeModal() {
      const modal = document.getElementById('transactionModal');
      if (modal) modal.remove();
      
      const editModal = document.getElementById('editModal');
      if (editModal) editModal.remove();
      
      const settingsModal = document.getElementById('settingsModal');
      if (settingsModal) settingsModal.remove();
      
      const historyModal = document.getElementById('historyModal');
      if (historyModal) historyModal.remove();
    }
    
    function toggleSettingsMenu() {
      const menu = document.getElementById('settingsMenu');
      if (menu) {
        menu.classList.toggle('hidden');
      }
      
      // Close when clicking outside
      setTimeout(() => {
        document.addEventListener('click', function closeMenu(e) {
          const menu = document.getElementById('settingsMenu');
          if (menu && !menu.contains(e.target) && !e.target.closest('button[onclick="toggleSettingsMenu()"]')) {
            menu.classList.add('hidden');
            document.removeEventListener('click', closeMenu);
          }
        });
      }, 0);
    }

    async function updateTransaction(backendId) {
      const transaction = allTransactions.find(t => t.__backendId === backendId);
      if (!transaction) return;
      
      const newDesc = document.getElementById(`desc_${backendId}`).value.trim();
      const newAmount = parseFloat(document.getElementById(`amt_${backendId}`).value);
      
      if (!newAmount || newAmount <= 0) {
        showToast('Please enter a valid amount', 'error');
        return;
      }
      
      const updatedTransaction = {
        ...transaction,
        description: newDesc,
        amount: newAmount
      };
      
      if (window.dataSdk) {
        const result = await window.dataSdk.update(updatedTransaction);
        if (result.isOk) {
          showToast('Transaction updated!', 'success');
        } else {
          showToast('Failed to update transaction', 'error');
        }
      }
    }
    
    function confirmDeleteTransaction(backendId) {
      const transaction = allTransactions.find(t => t.__backendId === backendId);

      const row = document.getElementById(`desc_${backendId}`).closest('.edit-transaction-row');
      row.innerHTML = `

    async function deleteTransaction(backendId) {
      const transaction = allTransactions.find(t => t.__backendId === backendId);
      if (!transaction) return;
      
      if (window.dataSdk) {
        const result = await window.dataSdk.delete(transaction);
        if (result.isOk) {
          showToast('Transaction deleted', 'success');
          closeModal();
        } else {

        }

    }
    
    function downloadTransactions(format) {
      const userTxns = getUserTransactions();
      
      if (userTxns.length === 0) {
        showToast('No transactions to download', 'warning');
        return;
      }
      
      if (format === 'csv') {
        let csv = 'Date,Type,Category,Payment Method,Amount,Description\n';
        userTxns.forEach(t => {
          const cat = getCategoryById(t.category);
          const pm = getPaymentMethodById(t.paymentMethod);
          csv += `${t.date},${t.type},${cat.name},${pm.name},${t.amount},"${t.description || ''}"\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `transactions_${currentUser.username}_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
        showToast('CSV downloaded successfully!', 'success');
      } else if (format === 'pdf') {
        // Generate simple text-based PDF content
        let pdfContent = `TRANSACTION HISTORY\n`;
        pdfContent += `User: ${currentUser.username}\n`;

        pdfContent += `${'='.repeat(80)}\n\n`;
        
        userTxns.forEach(t => {

          const pm = getPaymentMethodById(t.paymentMethod);
          pdfContent += `Date: ${t.date}\n`;
          pdfContent += `Type: ${t.type.toUpperCase()}\n`;
          pdfContent += `Category: ${cat.name}\n`;
          pdfContent += `Payment: ${pm.name}\n`;
          pdfContent += `Amount: ${formatCurrency(t.amount)}\n`;
          pdfContent += `Description: ${t.description || 'N/A'}\n`;
          pdfContent += `${'-'.repeat(80)}\n\n`;
        });
        
        const blob = new Blob([pdfContent], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `transactions_${currentUser.username}_${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
        window.URL.revokeObjectURL(url);
        showToast('Transaction report downloaded!', 'success');
